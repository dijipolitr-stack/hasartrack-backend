version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hasartrack_db
    environment:
      POSTGRES_USER: hasartrack
      POSTGRES_PASSWORD: gizli_sifre
      POSTGRES_DB: hasartrack_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hasartrack -d hasartrack_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Node.js API ─────────────────────────────────────────────
  api:
    build: .
    container_name: hasartrack_api
    environment:
      DATABASE_URL: postgresql://hasartrack:gizli_sifre@db:5432/hasartrack_db
      JWT_SECRET: dev_secret_replace_in_production_min_64_chars_xxxxxxxxxxxxxxxxxx
      JWT_EXPIRES: 8h
      NODE_ENV: development
      FRONTEND_URL: http://localhost:3000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./src:/app/src        # hot reload için
      - ./uploads:/app/uploads
    command: npm run dev

  # ── pgAdmin (DB yönetim arayüzü) ────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hasartrack_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@hasartrack.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
